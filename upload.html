<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    padding-top: 50px;
}

.box {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 12px;
    width: 360px;
}

input, button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    font-size: 14px;
}

.drop {
    border: 2px dashed #4da3ff;
    padding: 25px;
    text-align: center;
    margin-top: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.drop.dragover {
    background: rgba(77,163,255,0.2);
}
</style>
</head>

<body>

<div class="box">
    <h2>Upload File</h2>

    <input id="title" placeholder="Title">

    <div class="drop" id="fileDrop">
        Drop file here or click to select
    </div>

    <input type="file"
        id="fileInput"
        accept=".ma2d1,.ma3d1,.tstlt,.psprm,.tsbgl,.crsd,.card,.tsanm"
        hidden>

    <button onclick="upload()">Upload</button>
</div>

<script>
const fileDrop = document.getElementById("fileDrop");
const fileInput = document.getElementById("fileInput");

let mainFile = null;

fileDrop.onclick = () => fileInput.click();

fileDrop.addEventListener("dragover", e => {
    e.preventDefault();
    fileDrop.classList.add("dragover");
});

fileDrop.addEventListener("dragleave", () => {
    fileDrop.classList.remove("dragover");
});

fileDrop.addEventListener("drop", e => {
    e.preventDefault();
    fileDrop.classList.remove("dragover");
    handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener("change", () => {
    handleFile(fileInput.files[0]);
});

function handleFile(file) {
    if (!file) return;

    mainFile = file;
    fileDrop.innerText = "Selected: " + file.name;
}

function upload() {
    const title = document.getElementById("title").value;

    if (!title) {
        alert("Enter a title");
        return;
    }

    if (!mainFile) {
        alert("Select a file");
        return;
    }

    const formData = new FormData();
    formData.append("title", title);
    formData.append("file", mainFile);

    fetch("/upload", {
        method: "POST",
        body: formData
    })
    .then(r => r.text())
    .then(msg => alert(msg))
    .catch(() => alert("Upload failed"));
}
</script>

</body>
</html>
